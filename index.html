<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mejeri-Fejlrapporteringstræning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        .hmi-screen {
            background: #111827;
            border: 12px solid #1f2937;
            box-shadow: 0 0 60px rgba(0,255,100,0.3), inset 0 0 80px rgba(0,0,0,0.9);
            font-family: 'Courier New', monospace;
        }
        .alarm-banner { animation: alarmBlink 1.2s infinite; }
        @keyframes alarmBlink { 50% { background-color: #b91c1c; } }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .option-btn { transition: all 0.2s; padding: 1rem; margin-bottom: 0.5rem; }
        .correct { background-color: #166534 !important; border-color: #4ade80; }
        .wrong { background-color: #991b1b !important; }
    </style>
</head>
<body class="bg-zinc-950 text-white">

<div class="max-w-7xl mx-auto p-4">
    <div class="bg-black border-b border-green-600 p-6 flex justify-between items-center rounded-3xl mb-6">
        <div class="flex items-center gap-4">
            <i class="fas fa-beer text-5xl text-amber-400"></i>
            <div>
                <h1 class="text-4xl font-bold text-green-400">ØlFabrik A/S</h1>
                <p class="text-green-300">Fejlrapporteringstræning</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <label class="cursor-pointer bg-zinc-700 hover:bg-zinc-600 px-6 py-3 rounded-2xl flex items-center gap-3">
                <i class="fas fa-upload"></i>
                <span>Upload Excel</span>
                <input type="file" id="excel-upload" accept=".xlsx,.xls" class="hidden" onchange="handleExcelUpload(event)">
            </label>
            <button onclick="showTab(1)" class="bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-2xl">SCENARIER</button>
            <button onclick="showTab(2)" class="bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-2xl">STATISTIK</button>
        </div>
    </div>

    <div class="p-4 bg-zinc-900 rounded-3xl text-center mb-8">
        <span id="excel-status" class="text-green-400">14 standardscenarier indlæst</span>
    </div>

    <div id="tab-1" class="tab-content active">
        <h2 class="text-3xl font-bold mb-8 text-center">Vælg et scenarie</h2>
        <div id="scenario-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>

    <div id="tab-2" class="tab-content">
        <h2 class="text-3xl font-bold mb-8 text-center">Fejlstatistik</h2>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-zinc-900 rounded-3xl p-8">
                <h3 class="font-bold text-xl mb-6 text-center">Fordeling efter type (HMI Tekst)</h3>
                <div class="relative max-w-xs mx-auto">
                    <canvas id="pieChart" height="320"></canvas>
                </div>
            </div>
            <div class="bg-zinc-900 rounded-3xl p-8">
                <h3 class="font-bold text-xl mb-6 text-center">Antal fejl pr. Fejlkodegruppe</h3>
                <canvas id="barChart" height="320"></canvas>
            </div>
        </div>
    </div>

    <div id="tab-3" class="tab-content">
        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
            <div class="xl:col-span-5">
                <div class="bg-zinc-900 rounded-3xl p-6">
                    <h3 class="text-2xl font-bold mb-4">HMI-SKÆRM</h3>
                    <div id="hmi-screen" class="hmi-screen rounded-2xl p-8 h-[520px]">
                        <div class="flex justify-between border-b border-green-900 pb-4 mb-6">
                            <div class="text-2xl font-bold">FLASKELINJE 3B</div>
                            <div id="hmi-time" class="text-sm"></div>
                        </div>
                        <div id="alarm-banner" class="alarm-banner bg-red-700 text-white p-6 rounded-xl mb-8">
                            <i class="fas fa-exclamation-triangle text-3xl"></i>
                            <div class="ml-4">
                                <div id="alarm-code-display" class="font-bold text-xl"></div>
                                <div id="alarm-text-display" class="text-sm"></div>
                            </div>
                        </div>
                        <div class="bg-zinc-800 p-6 rounded-2xl">
                            <div class="text-xs text-zinc-400 mb-2">FEJLBESKRIVELSE</div>
                            <div id="hmi-description" class="text-base"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="xl:col-span-7">
                <div class="bg-zinc-900 rounded-3xl p-6 h-full flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-2xl font-bold">Rolleleg med Teknikeren</h3>
                        <div class="text-2xl font-bold text-green-400" id="current-score">Score: 0/100</div>
                    </div>
                    <div id="roleplay-stage" class="flex-1"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ==================== INITIAL DATA (DEFAULT) ====================
let defaultData = [ 
    {beskrivelse:"Transportbånd med motoroverbelastning", alarmkode:"ALM-102", hmitext:"Termofejl", forsogt:"Motor nulstillet og transportbånd kontrolleret for blokeringer.", arsag:"Overbelastning pga. ophobning af produkter.", handling:"Indfør rutine for fjernelse af ophobning og overvågning af motorbelastning.", fejlkodegruppe:"1xx"},
    {beskrivelse:"Palleteringsrobot med koordinatfejl", alarmkode:"ALM-306", hmitext:"Positioneringsfejl", forsogt:"Robot nulstillet og koordinater kontrolleret.", arsag:"Forkert opsætning efter produktændring.", handling:"Tjek opsætningsparametre ved produktskift og dokumentér ændringer.", fejlkodegruppe:"3xx"},
    {beskrivelse:"Sensor der ikke registrerer objekt", alarmkode:"ALM-201", hmitext:"Sensor fejl", forsogt:"Sensor rengjort og testet med objekt.", arsag:"Sensor tilstøvet eller defekt.", handling:"Planlagt rengøring og udskiftning ved gentagne fejl.", fejlkodegruppe:"2xx"},
    {beskrivelse:"Maskine der ikke starter efter nødstop", alarmkode:"ALM-403", hmitext:"Datafejl", forsogt:"Nødstop nulstillet og system genstartet.", arsag:"Sikkerhedskredsløb ikke korrekt nulstillet.", handling:"Tjek sikkerhedskredsløb og uddan operatører i korrekt nulstilling.", fejlkodegruppe:"4xx"},
    {beskrivelse:"Positioneringsfejl ved pakning", alarmkode:"ALM-305", hmitext:"Positioneringsfejl", forsogt:"Pakkeplacering justeret og system testet.", arsag:"Opsætningsfejl i positioneringssensor.", handling:"Kalibrer sensor og dokumentér opsætning.", fejlkodegruppe:"3xx"},
    {beskrivelse:"Flaske sidder fast ved indløb til palleteringssystem.", alarmkode:"ALM-203", hmitext:"Sensor fejl", forsogt:"Sensor er rengjort, og flasken er fjernet manuelt. System nulstillet via HMI.", arsag:"Sensor S12 var tilstøvet og registrerede ikke flasken korrekt.", handling:"Planlagt rengøring og udskiftning.", fejlkodegruppe:"2xx"},
    {beskrivelse:"Transportbånd stopper uventet", alarmkode:"ALM-102", hmitext:"Termofejl", forsogt:"Motor nulstillet og visuel inspektion udført.", arsag:"Motoroverbelastning pga. blokering.", handling:"Fjern blokering og kontroller motorens belastningsgrænse.", fejlkodegruppe:"1xx"},
    {beskrivelse:"Palleteringsrobot stopper med koordinatfejl", alarmkode:"ALM-305", hmitext:"Positioneringsfejl", forsogt:"Robot nulstillet og referenceposition kontrolleret.", arsag:"Forkert opsætning af koordinatsystem.", handling:"Gennemgå opsætning og kalibrering.", fejlkodegruppe:"3xx"},
    {beskrivelse:"Sensor registrerer ikke objekt", alarmkode:"ALM-201", hmitext:"Sensor fejl", forsogt:"Sensor rengjort og testet med objekt.", arsag:"Sensor defekt eller forkert justeret.", handling:"Udskift sensor og kontroller placering.", fejlkodegruppe:"2xx"},
    {beskrivelse:"Maskinstop ved åbning af dør", alarmkode:"ALM-401", hmitext:"Sikkerheds fejl", forsogt:"Dør lukket og system nulstillet.", arsag:"Sikkerhedskontakt aktiveret.", handling:"Kontroller dørkontakt og sikkerhedskredsløb.", fejlkodegruppe:"4xx"},
    {beskrivelse:"Forkert produktpositionering", alarmkode:"ALM-305", hmitext:"Positioneringsfejl", forsogt:"Produkt fjernet og ny cyklus startet.", arsag:"Opsætningsfejl i positioneringssystem.", handling:"Justér positioneringsparametre.", fejlkodegruppe:"3xx"},
    {beskrivelse:"Sensor med konstant signal", alarmkode:"ALM-204", hmitext:"Manglende sensor signal", forsogt:"Sensor afmonteret og testet separat.", arsag:"Signalfejl eller kortslutning.", handling:"Udskift sensor.", fejlkodegruppe:"2xx"},
    {beskrivelse:"Maskinen starter ikke efter nødstop", alarmkode:"ALM-403", hmitext:"Datafejl", forsogt:"Nødstop nulstillet og system genstartet.", arsag:"Sikkerhedskredsløb ikke reset korrekt.", handling:"Kontroller reset-procedure.", fejlkodegruppe:"4xx"},
    {beskrivelse:"Flaske sidder fast ved udløb fra palleteringssystem.", alarmkode:"ALM-203", hmitext:"Sensor fejl", forsogt:"Sensor er rengjort, og flasken er fjernet manuelt.", arsag:"Sensor S42 var tilstøvet.", handling:"Planlagt rengøring af sensor.", fejlkodegruppe:"2xx"}
];

let fejlData = [...defaultData];
let currentIndex = 0;
let currentStep = 0;
let currentFejl = {};
let studentInitials = "";
let totalScore = 0;
let pieChartInstance = null;
let barChartInstance = null;

// ==================== INITIALER ====================
function askForInitials() {
    if (!studentInitials) {
        let input = prompt("Indtast dine initialer (3 bogstaver):", "ABC");
        studentInitials = (input ? input.toUpperCase().slice(0,3) : "XXX");
    }
}

// ==================== SCENARIE LISTE ====================
function renderScenarioList() {
    const container = document.getElementById('scenario-list');
    if (!container) return;
    container.innerHTML = fejlData.map((fejl, i) => `
        <div onclick="startScenario(${i})" class="bg-zinc-800 hover:bg-zinc-700 p-6 rounded-3xl cursor-pointer transition">
            <div class="font-semibold text-white">${fejl.beskrivelse || "Uden beskrivelse"}</div>
            <div class="text-green-400 text-sm mt-2">${fejl.alarmkode || "Ingen kode"} - ${fejl.hmitext || "Ingen tekst"} (${fejl.fejlkodegruppe || "Ukendt gruppe"})</div>
        </div>
    `).join('');
}

function startScenario(i) {
    currentIndex = i;
    askForInitials();
    totalScore = 0;
    showTab(3);
    newHmiScenario();
}

// ==================== ROLLELEG ====================
function newHmiScenario() {
    currentFejl = fejlData[currentIndex];
    document.getElementById('alarm-code-display').textContent = currentFejl.alarmkode || "Mangler";
    document.getElementById('alarm-text-display').textContent = currentFejl.hmitext || "Mangler";
    document.getElementById('hmi-description').textContent = currentFejl.beskrivelse || "Mangler";
    
    currentStep = 0;
    totalScore = 0;
    updateScore();
    renderRoleplayStep();
}

function updateScore() {
    document.getElementById('current-score').textContent = `Score: ${totalScore}/100`;
}

function renderRoleplayStep() {
    const container = document.getElementById('roleplay-stage');
    let html = `<div class="text-green-400 mb-6">Trin ${currentStep + 1} af 4 • Spiller: ${studentInitials}</div>`;

    if (currentStep === 0) {
        html += `
            <div class="bg-zinc-700 p-6 rounded-2xl mb-8">
                <strong>Tekniker:</strong> Hvad viser HMI-skærmen af alarmkode?
            </div>
            <input type="text" id="alarm-input" class="w-full bg-zinc-800 border border-zinc-600 rounded-2xl px-6 py-5 text-lg mb-6 text-white" placeholder="Skriv koden præcist (f.eks. ${currentFejl.alarmkode || 'ALM-102'})">
            <button onclick="checkAlarmInput()" class="w-full bg-green-600 hover:bg-green-500 py-5 rounded-2xl text-lg font-semibold text-white">Send svar</button>
        `;
    } else {
        let question = "", correct = "";
        if (currentStep === 1) { question = "Hvad har du forsøgt?"; correct = currentFejl.forsogt; }
        if (currentStep === 2) { question = "Mistanke om årsag?"; correct = currentFejl.arsag; }
        if (currentStep === 3) { question = "Anbefalet handling?"; correct = currentFejl.handling; }

        let options = [correct];
        fejlData.forEach(f => {
            if (f !== currentFejl) {
                if (currentStep === 1 && f.forsogt) options.push(f.forsogt);
                if (currentStep === 2 && f.arsag) options.push(f.arsag);
                if (currentStep === 3 && f.handling) options.push(f.handling);
            }
        });
        
        options = [...new Set(options)].filter(Boolean).slice(0, 4).sort(() => Math.random() - 0.5);

        if (options.indexOf(correct) === -1 && correct) {
            options.push(correct);
        }

        html += `<p class="mb-6 font-medium text-lg text-zinc-200">${question}</p><div class="flex flex-col gap-3">`;
        options.forEach(opt => {
            html += `
                <button onclick="selectAnswer(this, ${opt === correct})" 
                        class="option-btn text-left bg-zinc-800 hover:bg-zinc-700 rounded-2xl border border-zinc-600 p-4 text-white w-full">
                    ${opt}
                </button>
            `;
        });
        html += `</div>`;
    }
    container.innerHTML = html;
}

function checkAlarmInput() {
    const input = document.getElementById('alarm-input').value.trim();
    if (currentFejl.alarmkode && input.toLowerCase().includes(currentFejl.alarmkode.toLowerCase())) {
        totalScore += 25;
        updateScore();
        currentStep = 1;
        renderRoleplayStep();
    } else {
        alert("Prøv igen — husk at skrive alarmkoden præcist (f.eks. " + (currentFejl.alarmkode || "ALM-102") + ")");
    }
}

function selectAnswer(btn, isCorrect) {
    document.querySelectorAll('#roleplay-stage button').forEach(b => b.disabled = true);
    if (isCorrect) {
        totalScore += 25;
        updateScore();
        btn.classList.add('correct');
        setTimeout(() => {
            currentStep++;
            if (currentStep < 4) renderRoleplayStep();
            else showCompletion();
        }, 1000);
    } else {
        btn.classList.add('wrong');
        setTimeout(renderRoleplayStep, 1500);
    }
}

function showCompletion() {
    let feedback = totalScore >= 90 ? "Fremragende!" : totalScore >= 70 ? "Godt arbejde!" : totalScore >= 50 ? "Okay resultat." : "Prøv igen.";
    document.getElementById('roleplay-stage').innerHTML = `
        <div class="text-center py-16">
            <div class="text-7xl mb-6">🎉</div>
            <h3 class="text-4xl font-bold text-green-400">Scenarie gennemført!</h3>
            <div class="text-6xl font-bold text-green-400 my-8">${totalScore}/100</div>
            <p class="text-2xl">${feedback}</p>
            <button onclick="showTab(1)" class="mt-12 bg-green-600 hover:bg-green-500 px-12 py-5 rounded-2xl text-xl text-white">Gå til Scenarier</button>
        </div>
    `;
}

// ==================== NAVIGATION & STATISTIK ====================
function showTab(n) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    const targetedTab = document.getElementById(`tab-${n}`);
    if (targetedTab) targetedTab.classList.add('active');
    if (n === 2) {
        initCharts();
    }
}

function initCharts() {
    const hmiTæller = {};
    fejlData.forEach(item => {
        if(item.hmitext) hmiTæller[item.hmitext] = (hmiTæller[item.hmitext] || 0) + 1;
    });

    // Gruppering baseret på kolonnen 'fejlkodegruppe' (f.eks. 1xx, 2xx, 3xx, 4xx)
    const gruppeTæller = { "1xx": 0, "2xx": 0, "3xx": 0, "4xx": 0 };
    fejlData.forEach(item => {
        if(item.fejlkodegruppe) {
            let g = item.fejlkodegruppe.trim().toLowerCase();
            if(g.includes("1")) gruppeTæller["1xx"]++;
            else if(g.includes("2")) gruppeTæller["2xx"]++;
            else if(g.includes("3")) gruppeTæller["3xx"]++;
            else if(g.includes("4")) gruppeTæller["4xx"]++;
        } else if (item.alarmkode) {
            // Supplerende logik hvis fejlkodegruppe kolonnen mod forventning er tom: Træk første ciffer ud af koden (f.eks. ALM-301 -> 3xx)
            let match = item.alarmkode.match(/\d/);
            if(match) {
                gruppeTæller[match[0] + "xx"] = (gruppeTæller[match[0] + "xx"] || 0) + 1;
            }
        }
    });

    if (pieChartInstance) pieChartInstance.destroy();
    if (barChartInstance) barChartInstance.destroy();

    const farver = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899', '#64748b'];

    const ctxPie = document.getElementById('pieChart');
    if (ctxPie) {
        pieChartInstance = new Chart(ctxPie.getContext('2d'), {
            type: 'pie',
            data: {
                labels: Object.keys(hmiTæller),
                datasets: [{
                    data: Object.values(hmiTæller),
                    backgroundColor: farver.slice(0, Object.keys(hmiTæller).length),
                    borderWidth: 1,
                    borderColor: '#18181b'
                }]
            },
            options: { responsive: true, plugins: { legend: { labels: { color: 'white' } } } }
        });
    }

    const ctxBar = document.getElementById('barChart');
    if (ctxBar) {
        barChartInstance = new Chart(ctxBar.getContext('2d'), {
            type: 'bar',
            data: {
                labels: Object.keys(gruppeTæller),
                datasets: [{
                    label: 'Antal Forekomster',
                    data: Object.values(gruppeTæller),
                    backgroundColor: '#22c55e',
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                scales: {
                    x: { ticks: { color: 'white' }, grid: { color: '#27272a' } },
                    y: { ticks: { color: 'white', stepSize: 1 }, grid: { color: '#27272a' }, beginAtZero: true }
                },
                plugins: { legend: { display: false } }
            }
        });
    }
}

// ==================== AVANCERET EXCEL INDLÆSNING ====================
function handleExcelUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(evt) {
        try {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];
            
            // Konverterer via det sikre array-format for at beskytte æ, ø, å og bindestreger
            const rows = XLSX.utils.sheet_to_json(worksheet, {header: 1});
            
            if(rows.length > 1) {
                const headers = rows[0].map(h => String(h).trim().toLowerCase().replace(/[\s\-_]/g, ''));
                
                // Målrettede indekser baseret på dine præcise kolonnenavne i filen
                const idxBeskrivelse = headers.findIndex(h => h.includes('beskrivelse') || h.includes('desc'));
                const idxKode = headers.findIndex(h => h.includes('alarmkode') || h.includes('kode') || h.includes('code'));
                const idxTekst = headers.findIndex(h => h.includes('hmitekst') || h.includes('tekst') || h.includes('text'));
                const idxForsogt = headers.findIndex(h => h.includes('forsøgt') || h.includes('forsogt') || h.includes('hvad'));
                const idxArsag = headers.findIndex(h => h.includes('årsag') || h.includes('arsag') || h.includes('mistanke'));
                const idxHandling = headers.findIndex(h => h.includes('handling') || h.includes('løsning') || h.includes('anbefalet'));
                const idxGruppe = headers.findIndex(h => h.includes('kodegruppe') || h.includes('gruppe'));

                const nyeScenarier = [];

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row.length === 0) continue;

                    const beskrivelse = idxBeskrivelse !== -1 ? row[idxBeskrivelse] : row[0];
                    const alarmkode = idxKode !== -1 ? row[idxKode] : row[1];
                    const hmitext = idxTekst !== -1 ? row[idxTekst] : row[2];
                    const forsogt = idxForsogt !== -1 ? row[idxForsogt] : row[4];
                    const arsag = idxArsag !== -1 ? row[idxArsag] : row[5];
                    const handling = idxHandling !== -1 ? row[idxHandling] : row[6];
                    const fejlkodegruppe = idxGruppe !== -1 ? row[idxGruppe] : row[7];

                    if (beskrivelse || alarmkode) {
                        nyeScenarier.push({
                            beskrivelse: String(beskrivelse || "").trim(),
                            alarmkode: String(alarmkode || "").trim(),
                            hmitext: String(hmitext || "Ukendt fejltype").trim(),
                            forsogt: String(forsogt || "").trim(),
                            arsag: String(arsag || "").trim(),
                            handling: String(handling || "").trim(),
                            fejlkodegruppe: String(fejlkodegruppe || "").trim()
                        });
                    }
                }

                if (nyeScenarier.length > 0) {
                    fejlData = nyeScenarier;
                    document.getElementById('excel-status').textContent = `${fejlData.length} scenarier indlæst korrekt fra Excel!`;
                    renderScenarioList();
                    showTab(1); 
                    alert("Succes! " + fejlData.length + " scenarier blev indlæst. Diagrammerne viser nu fejl opdelt pr. Fejlkodegruppe (1xx, 2xx osv.)!");
                } else {
                    alert("Der kunne ikke trækkes data ud af rækkerne.");
                }
            } else {
                alert("Excel-filen var tom.");
            }
        } catch (err) {
            console.error(err);
            alert("Fejl under indlæsning af Excel.");
        }
    };
    reader.readAsArrayBuffer(file);
}

// ==================== INIT ====================
window.onload = function() {
    renderScenarioList();
    showTab(1);
    
    setInterval(() => {
        const el = document.getElementById('hmi-time');
        if (el) el.textContent = new Date().toLocaleTimeString('da-DK', {hour:'2-digit', minute:'2-digit'});
    }, 1000);
};
</script>
</body>
</html>
